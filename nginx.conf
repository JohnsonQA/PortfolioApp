user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # HTTP server (INITIAL SETUP – no SSL yet)
    server {
        server_name static.app.infralabx.space www.static.app.infralabx.space;

        location / {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/static.app.infralabx.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/static.app.infralabx.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

    # SSL BLOCK REMOVED FOR INITIAL BOOT
    # (Certbot --nginx will automatically add this later)

    server {
    if ($host = www.static.app.infralabx.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = static.app.infralabx.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        server_name static.app.infralabx.space www.static.app.infralabx.space;
    return 404; # managed by Certbot




}}
